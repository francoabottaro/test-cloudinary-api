services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: my-profile-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${USERNAME_DB}
      POSTGRES_PASSWORD: ${PASSWORD_DB}
      POSTGRES_DB: ${NAME_DB}
    ports:
      - '${PORT_DB:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
